<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artisan Lakeview Hotel | Luxury Heritage Stay</title>
    <script src="../config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Customer_Page/theArtisanHomePage.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../js/login.js"></script>
<body class="bg-white text-stone-900">

<div id="loginView" class="p-10 md:p-28 flex flex-col md:flex-row gap-28">
    <div class="md:w-5/12 md:border-r md:border-stone-100 md:pr-28">
        <h3 class="text-4xl serif italic mb-12 leading-tight">You are a member of The Artisan</h3>
        <p class="text-stone-500 text-lg leading-relaxed mb-14 italic">This is a Dashboard for Artisan's Staff.</p>
        <ul class="space-y-12">
            <li class="flex items-center space-x-8"><div class="w-2 h-2 bg-gold rounded-full"></div><span class="text-[12px] font-bold uppercase tracking-[0.3em] text-blue-950">1</span></li>
            <li class="flex items-center space-x-8"><div class="w-2 h-2 bg-gold rounded-full"></div><span class="text-[12px] font-bold uppercase tracking-[0.3em] text-blue-950">2</span></li>
            <li class="flex items-center space-x-8"><div class="w-2 h-2 bg-gold rounded-full"></div><span class="text-[12px] font-bold uppercase tracking-[0.3em] text-blue-950">3</span></li>
        </ul>
    </div>
    <div class="md:w-7/12 flex flex-col justify-center">
        <form id="loginForm" class="space-y-12 max-w-md mx-auto w-full">
            <div>
                <label class="form-label">Username *</label>
                <input id="username" type="text" class="form-input" placeholder="artisan_user">
            </div>
        
            <div>
                <label class="form-label">Password *</label>
                <input id="password" type="password" class="form-input" placeholder="••••••••">
            </div>
        
            <button type="submit" class="btn-gold !w-full shadow-2xl tracking-[0.5em] py-6">
                Sign Into Account
            </button>
        
            <p id="loginError" class="text-red-500 text-sm hidden"></p>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="./admin_login.js"></script>
</body>
</html>
