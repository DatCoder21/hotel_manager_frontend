<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | The Artisan</title>
    <script src="../config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="../Customer_Page/theArtisanHomePage.css">

</head>

<body class="bg-stone-100 text-stone-900">

<!-- HEADER -->
<header class="w-full bg-white border-b px-12 py-8 flex justify-between items-center sticky top-0 shadow-sm">
    <div class="text-3xl font-bold tracking-widest uppercase">
        <a href="../Customer_Page/TheArtisanHomePage.html">The Artisan</a>
    </div>

    <nav class="flex space-x-10 text-[11px] uppercase font-bold tracking-[0.3em]">
        <a href="./myProfilePage.html" class="hover:text-yellow-600">My Profile</a>
        <a href="./bookingsPage.html" class="text-yellow-600">My Bookings</a>
        <a href="./selfServicePage.html" class="hover:text-yellow-600">Self Service</a>
    </nav>
</header>

<!-- MAIN -->
<main class="container mx-auto max-w-7xl py-24 px-12">

    <h2 class="text-5xl italic mb-16">My Bookings</h2>

    <!-- Loading -->
    <div id="loading" class="text-center text-stone-500">
        Loading bookings...
    </div>

    <!-- Not logged in -->
    <div id="notLogin" class="hidden text-center text-red-500 font-semibold">
        You need to login to view bookings.
    </div>

    <!-- Empty -->
    <div id="empty" class="hidden text-center text-stone-500">
        No bookings found.
    </div>

    <!-- Booking list -->
    <div id="bookingList" class="space-y-12"></div>
   

</main>

<!-- JS -->
<script src="./bookings.js"></script>
<script src="./invoice.js"></script>

<!-- INVOICE MODAL -->
<div id="invoiceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
    
    <div class="bg-white w-[420px] rounded-lg shadow-xl relative font-mono">

        <!-- HEADER -->
        <div class="text-center border-b p-4">
            <h2 class="text-xl font-bold tracking-widest">THE ARTISAN</h2>
            <p class="text-xs text-gray-500">Hotel & Restaurant</p>
        </div>

        <!-- CONTENT -->
        <div id="invoiceContent" class="p-4 text-sm space-y-2"></div>

        <!-- FOOTER -->
        <div class="p-4 border-t text-center">
            <button 
                id="payBtn"
                class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
                Pay Now
            </button>

            <!-- THÔNG BÁO -->
            <p id="paymentStatus" class="hidden mt-3 text-green-600 font-semibold">
                ✔ Payment Successful
            </p>
        </div>

        <!-- CLOSE -->
        <button onclick="closeInvoice()" 
            class="absolute top-2 right-3 text-gray-400 text-xl">✕</button>

    </div>
</div>

</div>
</body>
</html>
